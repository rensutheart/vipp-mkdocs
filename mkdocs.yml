site_name: VIPP — Visual Image Processing Platform
site_description: Visual workflows for reproducible bioimage analysis.
site_author: Rensu P. Theart
site_url: https://rensutheart.github.io/vipp-mkdocs/
repo_url: https://github.com/rensutheart/vipp-mkdocs
repo_name: rensutheart/vipp-mkdocs
edit_uri: edit/main/docs/
copyright: >-
  Copyright &copy; 2026 Rensu P. Theart. Documentation text and original
  screenshots are licensed under
  <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: assets/branding/vipp-mark.svg
  favicon: assets/branding/vipp-mark.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font: false

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - privacy:
      assets: true
      assets_fetch: true
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - redirects:
      redirect_maps:
        getting-started/first-workflow.md: getting-started/example-tour.md
        examples/index.md: reference/example-workflows.md
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true
      type: date

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  version:
    provider: mike
    default: stable
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rensutheart/napari-vipp
      name: napari-vipp source code
  generator: false
  status:
    alpha: Alpha

