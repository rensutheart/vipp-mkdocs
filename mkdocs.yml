site_name: napari-vipp Documentation
site_description: Searchable user and system documentation for napari-vipp.
site_author: Rensu P. Theart
repo_url: https://github.com/rensutheart/napari-vipp
repo_name: rensutheart/napari-vipp

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - Launching VIPP: getting-started/launching.md
      - First Workflow: getting-started/first-workflow.md
  - Concepts:
      - Overview: concepts/index.md
      - Graph Workflows: concepts/graph-workflows.md
      - Data Types: concepts/data-types.md
      - Axes And Metadata: concepts/axes-and-metadata.md
      - Inspection Model: concepts/inspection-model.md
      - Examples And Samples: concepts/examples-and-samples.md
  - Workflows:
      - Overview: workflows/index.md
      - Segmentation And Label Cleanup: workflows/segmentation-label-cleanup.md
      - Object Measurements And Tables: workflows/object-measurements-tables.md
      - Skeleton And Network Analysis: workflows/skeleton-network-analysis.md
      - Colocalization And Association: workflows/colocalization-association.md
      - PSF And Deconvolution: workflows/psf-deconvolution.md
      - Batch Processing: workflows/batch-processing.md
  - Examples:
      - Overview: examples/index.md
      - Workflow Screenshots: examples/workflow-screenshots.md
  - Reference:
      - Overview: reference/index.md
      - Node Index: reference/node-index.md
      - Sample Data: reference/sample-data.md
      - Example Workflows: reference/example-workflows.md
      - Import And Export: reference/import-export.md
      - Cache And Memory: reference/cache-memory.md
      - Validation Status: reference/validation-status.md
  - Troubleshooting:
      - Overview: troubleshooting/index.md
      - Performance: troubleshooting/performance.md
      - Common Pitfalls: troubleshooting/common-pitfalls.md
  - Developer:
      - Overview: developer/index.md
      - Documentation Roadmap: developer/documentation-roadmap.md
      - Screenshot Plan: developer/screenshot-plan.md
