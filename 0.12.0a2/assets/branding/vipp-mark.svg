<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-labelledby="title desc">
  <title id="title">VIPP symbol</title>
  <desc id="desc">A V formed by connected, colorful image pixels, representing a visual image-processing pipeline.</desc>

  <!-- The dark tile gives the mark a predictable edge on light and dark surfaces. -->
  <rect x="8" y="8" width="176" height="176" rx="42" fill="#111827"/>

  <!-- Pipeline connections. -->
  <g fill="none" stroke="#475569" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M42 42 58 76 76 112 96 150"/>
    <path d="m150 42-16 34-18 36-20 38"/>
  </g>

  <!-- Image pixels / graph nodes. All geometry is deliberately simple to edit. -->
  <g stroke="#111827" stroke-width="5">
    <rect x="29" y="29" width="26" height="26" rx="8" fill="#38BDF8"/>
    <rect x="45" y="63" width="26" height="26" rx="8" fill="#22C55E"/>
    <rect x="63" y="99" width="26" height="26" rx="8" fill="#14B8A6"/>

    <rect x="137" y="29" width="26" height="26" rx="8" fill="#A78BFA"/>
    <rect x="121" y="63" width="26" height="26" rx="8" fill="#F472B6"/>
    <rect x="103" y="99" width="26" height="26" rx="8" fill="#F59E0B"/>

    <rect x="82" y="136" width="28" height="28" rx="9" fill="#E2E8F0"/>
  </g>

  <!-- The final bright voxel is the processed output / point of focus. -->
  <circle cx="96" cy="150" r="4" fill="#111827"/>
</svg>
