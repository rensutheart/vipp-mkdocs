<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">VIPP logo</title>
  <desc id="desc">The VIPP wordmark beside a V made from connected, colorful image pixels.</desc>

  <!-- SYMBOL -->
  <g id="symbol" transform="translate(24 24)">
    <rect x="8" y="8" width="176" height="176" rx="42" fill="#111827"/>
    <g fill="none" stroke="#475569" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 42 58 76 76 112 96 150"/>
      <path d="m150 42-16 34-18 36-20 38"/>
    </g>
    <g stroke="#111827" stroke-width="5">
      <rect x="29" y="29" width="26" height="26" rx="8" fill="#38BDF8"/>
      <rect x="45" y="63" width="26" height="26" rx="8" fill="#22C55E"/>
      <rect x="63" y="99" width="26" height="26" rx="8" fill="#14B8A6"/>
      <rect x="137" y="29" width="26" height="26" rx="8" fill="#A78BFA"/>
      <rect x="121" y="63" width="26" height="26" rx="8" fill="#F472B6"/>
      <rect x="103" y="99" width="26" height="26" rx="8" fill="#F59E0B"/>
      <rect x="82" y="136" width="28" height="28" rx="9" fill="#E2E8F0"/>
    </g>
    <circle cx="96" cy="150" r="4" fill="#111827"/>
  </g>

  <!-- CUSTOM WORDMARK: paths only, so it has no font dependency. -->
  <g id="wordmark" fill="#111827">
    <!-- V -->
    <path d="M250 55h39l42 119 42-119h39l-59 154h-44L250 55Z"/>
    <!-- I -->
    <rect x="435" y="55" width="36" height="154" rx="8"/>
    <!-- P -->
    <path fill-rule="evenodd" d="M501 55h69c47 0 73 23 73 62 0 40-26 63-73 63h-33v29h-36V55Zm36 32v61h31c26 0 39-10 39-31 0-20-13-30-39-30h-31Z"/>
    <!-- P -->
    <path fill-rule="evenodd" d="M669 55h69c47 0 73 23 73 62 0 40-26 63-73 63h-33v29h-36V55Zm36 32v61h31c26 0 39-10 39-31 0-20-13-30-39-30h-31Z"/>
  </g>
</svg>
